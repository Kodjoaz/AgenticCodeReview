---
# Agentic workflow — uses GitHub Models via actions/ai-inference
# Installed by CADO Framework — https://github.com/Keayoub/cado-framework
name: CADO Agent Skill Drift Detector

'on':
  pull_request:
    types: [opened, synchronize]
    paths:
      - '.github/agents/**'
      - '.github/skills/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read agent and skill files
        id: read-files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const readSafe = (filePath) => {
              try { return fs.readFileSync(filePath, 'utf8'); }
              catch { return '(file not found)'; }
            };

            const agentsYml = readSafe('.github/agents/agents.yml');
            const skillsYml = readSafe('.github/skills/skills.yml');

            const skillsDir = '.github/skills';
            let skillFilesList = '(none)';
            if (fs.existsSync(skillsDir)) {
              const findSkillMds = (dir) => {
                const entries = fs.readdirSync(dir, { withFileTypes: true });
                const files = [];
                for (const entry of entries) {
                  const fullPath = path.join(dir, entry.name);
                  if (entry.isDirectory()) files.push(...findSkillMds(fullPath));
                  else if (entry.name === 'SKILL.md') files.push(fullPath);
                }
                return files;
              };
              const found = findSkillMds(skillsDir);
              skillFilesList = found.length > 0 ? found.join('\n') : '(none)';
            }

            core.setOutput('agents_yml', agentsYml.slice(0, 3000));
            core.setOutput('skills_yml', skillsYml.slice(0, 3000));
            core.setOutput('skill_files_list', skillFilesList);

      - name: AI drift check
        id: ai-drift
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          github-token: ${{ secrets.GITHUB_TOKEN }}
          system-prompt: "You are an agent framework consistency auditor. Check for semantic drift between agent definitions and skill definitions."
          prompt: |
            Review the following CADO Framework agent and skill registry for consistency.

            agents.yml:
            ${{ steps.read-files.outputs.agents_yml }}

            skills.yml:
            ${{ steps.read-files.outputs.skills_yml }}

            Skill files present: ${{ steps.read-files.outputs.skill_files_list }}

            Check for:
            1. Agents referencing skill IDs not in skills.yml
            2. Skills in skills.yml with no SKILL.md file
            3. SKILL.md files not registered in skills.yml
            4. Agent descriptions misaligned with their assigned skills
            5. Missing required skills for high-risk agents (SecurityEngineer, SolutionArchitect)

            Output a markdown report:
            ## Consistency Status (PASS / WARN / FAIL)
            ## Issues Found
            ## Recommendations
          output-variable: drift_report

      - name: Post drift report as PR comment
        id: post-comment
        uses: actions/github-script@v7
        env:
          DRIFT_REPORT: ${{ steps.ai-drift.outputs.drift_report }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- cado-agent-skill-drift -->';
            const report = process.env.DRIFT_REPORT;

            const hasFail = report.includes('FAIL');
            core.setOutput('has_failures', hasFail ? 'true' : 'false');

            const statusIcon = hasFail ? '🔴' : report.includes('WARN') ? '🟡' : '🟢';
            const body = `${marker}\n## ${statusIcon} CADO Agent Skill Drift Report\n\n${report}\n\n---\n_Generated by GitHub Copilot · CADO Framework_`;

            const commentsResp = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber });
            const existing = commentsResp.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }

      - name: Fail on drift
        if: ${{ steps.post-comment.outputs.has_failures == 'true' }}
        run: |
          echo "::error::Agent/skill consistency check FAILED. Review the PR comment for details."
          exit 1
