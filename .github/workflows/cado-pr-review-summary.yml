---
# Agentic workflow — uses GitHub Models via actions/ai-inference
# Installed by CADO Framework — https://github.com/Keayoub/cado-framework
name: CADO PR Review Summary

'on':
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cado-pr-review-summary-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR data
        id: pr-data
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            const prResp = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const pr = prResp.data;

            const filesResp = await github.rest.pulls.listFiles({ owner, repo, pull_number: prNumber });
            const fileNames = filesResp.data.map(f => f.filename).join(', ');

            const diffResp = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
              mediaType: { format: 'diff' },
            });
            const rawDiff = String(diffResp.data);
            const diff = rawDiff.length > 8000 ? rawDiff.slice(0, 8000) + '\n... (truncated)' : rawDiff;

            core.setOutput('title', pr.title);
            core.setOutput('body', pr.body || '(no description)');
            core.setOutput('files', fileNames);
            core.setOutput('diff', diff);

      - name: AI summary
        id: ai-summary
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          github-token: ${{ secrets.GITHUB_TOKEN }}
          system-prompt: "You are a senior code reviewer. Produce a structured PR summary to help reviewers quickly understand the change."
          prompt: |
            PR Title: ${{ steps.pr-data.outputs.title }}
            PR Description: ${{ steps.pr-data.outputs.body }}
            Changed files: ${{ steps.pr-data.outputs.files }}

            Diff (truncated):
            ${{ steps.pr-data.outputs.diff }}

            Produce a concise markdown summary with these sections:
            ## What Changed
            ## Why (inferred from context)
            ## Risk Signals
            ## Review Focus Areas
          output-variable: summary

      - name: Post summary as PR comment
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ steps.ai-summary.outputs.summary }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- cado-pr-review-summary -->';
            const summary = process.env.SUMMARY;

            const body = `${marker}\n## 🤖 CADO PR Review Summary\n\n${summary}\n\n---\n_Generated by GitHub Copilot · CADO Framework_`;

            const commentsResp = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber });
            const existing = commentsResp.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }
