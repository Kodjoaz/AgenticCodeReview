---
# Agentic workflow — uses GitHub Models via actions/ai-inference
# Installed by CADO Framework — https://github.com/Keayoub/cado-framework
name: CADO CI Failure Triage

'on':
  workflow_run:
    workflows: ['*']
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get failed job logs
        id: get-logs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.payload.workflow_run.id;

            const jobsResp = await github.rest.actions.listJobsForWorkflowRun({ owner, repo, run_id: runId });
            const failedJob = jobsResp.data.jobs.find(j => j.conclusion === 'failure');

            if (!failedJob) {
              core.setOutput('job_name', 'unknown');
              core.setOutput('logs', '(no failed job found)');
              return;
            }

            core.setOutput('job_name', failedJob.name);

            try {
              const logsResp = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner, repo, job_id: failedJob.id
              });
              const rawLogs = String(logsResp.data);
              const lines = rawLogs.split('\n');
              const last200 = lines.slice(-200).join('\n');
              core.setOutput('logs', last200.slice(0, 6000));
            } catch {
              core.setOutput('logs', '(logs unavailable)');
            }

      - name: AI triage
        id: ai-triage
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          github-token: ${{ secrets.GITHUB_TOKEN }}
          system-prompt: "You are a CI failure triage expert. Analyze failing CI logs and produce a concise structured report."
          prompt: |
            Workflow: ${{ github.event.workflow_run.name }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.event.workflow_run.head_branch }}
            Failed job: ${{ steps.get-logs.outputs.job_name }}

            Logs (last 200 lines):
            ${{ steps.get-logs.outputs.logs }}

            Produce a markdown report with these sections:
            ## Root Cause
            ## Affected Files (if determinable)
            ## Suggested Fix
            ## Confidence (Low / Medium / High)
          output-variable: triage_report

      - name: Post triage result
        uses: actions/github-script@v7
        env:
          TRIAGE_REPORT: ${{ steps.ai-triage.outputs.triage_report }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.workflow_run.head_sha;
            const report = process.env.TRIAGE_REPORT;
            const workflowName = context.payload.workflow_run.name;
            const marker = '<!-- cado-ci-failure-triage -->';

            const body = `${marker}\n## 🔍 CADO CI Failure Triage\n\n**Workflow:** ${workflowName}\n\n${report}\n\n---\n_Generated by GitHub Copilot · CADO Framework_`;

            // Try to find an open PR for this commit
            const prsResp = await github.rest.pulls.list({ owner, repo, state: 'open' });
            const matchingPr = prsResp.data.find(pr => pr.head.sha === headSha);

            if (matchingPr) {
              const commentsResp = await github.rest.issues.listComments({ owner, repo, issue_number: matchingPr.number });
              const existing = commentsResp.data.find(c => c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: matchingPr.number, body });
              }
            } else {
              // No PR — write to job summary
              await core.summary.addRaw(body).write();
            }
