# CADO Framework Agent Registry
# version: 0.2.0

version: "0.2.0"
updated: "2026-04-28"
framework: cado
signals_protocol: ".cado/signals/"
workflow_docs: ".cado/workflow/"
skills_catalog: ".github/skills/skills.yml"
skills_dir: ".github/skills/"

cado_stages:
  intake:
    description: "Capture and structure the incoming request"
  plan:
    description: "Decompose into tasks with specialist assignments"
  gate:
    description: "Risk-based approval check before build"
  build:
    description: "Specialist implementation lanes"
  prove:
    description: "Validation + evidence collection"
  ship:
    description: "Ship summary and handoff record"

