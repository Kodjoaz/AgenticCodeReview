    role: CADO Framework Orchestrator (Maximus)
    priority: core
    status: active
    is_primary_coordinator: true
    is_entry_agent: true
    description: "Single entry orchestrator. Owns intake gating, stage transitions, risk classification, specialist routing, gate enforcement, and prove verification."
