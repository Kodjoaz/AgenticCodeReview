framework:
  name: CADO Framework
  version: "0.1.0"
  description: "Stage-based multi-agent delivery framework"
  homepage: "https://github.com/Keayoub/cado"

defaults:
  integration: copilot
  auto_commit: true
  approval_gate: cado-approve
  verbose: false

# Spec contract profile selection used by Maximus during Intake.
# If no explicit choice exists for a repo/run, Maximus asks once and falls back to spec-kit.
# Repositories may also choose `custom` and define their own artifact contract.
spec_frameworks:
  active: spec-kit
  ask_on_intake: true
  default_if_unspecified: spec-kit
  specs_root: specs
  custom_contract_file: .cado/policies/spec-contract.md
  options:
    spec-kit:
      display_name: Spec Kit
    openspec:
      display_name: OpenSpec
    custom:
      display_name: Custom

# Canonical agent role IDs stay stable across repos.
# Teams can override only display names/aliases to customize persona.
agent_identity:
  conductor:
    role_id: conductor
    display_name: Maximus
    aliases:
      - Conductor
      - Maximus

# Runtime model behavior profiles. Adapters may map these values to provider-specific settings.
runtime_profiles:
  active_profile: balanced
  profiles:
    precise:
      temperature: 0.1
      top_p: 0.9
      max_output_tokens: 4000
      reasoning_effort: high
      description: "Low variance for critical planning, gate checks, and audits"
    balanced:
      temperature: 0.35
      top_p: 0.95
      max_output_tokens: 5000
      reasoning_effort: medium
      description: "Default for most delivery orchestration and implementation tasks"
    creative:
      temperature: 0.7
      top_p: 0.98
      max_output_tokens: 6000
      reasoning_effort: medium
      description: "Higher ideation for design exploration and alternative solutions"

# Persona catalog inspired by soul-style orchestration patterns.
persona_profiles:
  active_persona: maximus
  personas:
    maximus:
      display_name: Maximus
      style: "Disciplined Roman general: calm, decisive, evidence-first"
      principles:
        - "Clarity before action"
        - "No completion claim without proof"
        - "Route to the right specialist"
      response_signature:
        - intent
        - plan
        - execution
        - evidence
        - status
        - next_move
    conductor:
      display_name: Conductor
      style: "Neutral orchestration voice for enterprise governance"
      principles:
        - "Predictable stage transitions"
        - "Risk gates are mandatory"
        - "No skipped verification"
      response_signature:
        - stage
        - intent
        - plan
        - risks_and_gates
        - evidence_collected
        - next_steps

# Optional per-role overrides to bind persona/profile at agent-role level.
role_runtime_overrides:
  conductor:
    persona: maximus
    runtime_profile: balanced

stages:
  - name: intake
    description: "Capture and understand the incoming request"
    timeout_minutes: 30

  - name: plan
    description: "Decompose into deliverables and specialist work"
    timeout_minutes: 60

  - name: gate
    description: "Verify readiness and collect evidence"
    timeout_minutes: 30

  - name: build
    description: "Execute specialist implementations"
    timeout_minutes: 300

  - name: prove
    description: "Validate, test, and collect evidence"
    timeout_minutes: 120

  - name: ship
    description: "Finalize, merge, and deploy to production"
    timeout_minutes: 120

evidence_types:
  - name: tests
    description: "Unit, integration, and E2E test results"
    required_for_gates: true

  - name: lint
    description: "Linting and code quality checks"
    required_for_gates: true

  - name: build
    description: "Successful build artifacts"
    required_for_gates: true

  - name: security
    description: "Security scanning and vulnerability checks"
    required_for_gates: true

  - name: migration
    description: "Data migration and schema change verification"
    required_for_gates: false

  - name: docs
    description: "Documentation updates and API references"
    required_for_gates: false

  - name: performance
    description: "Load test and performance benchmark results"
    required_for_gates: false

approval_gates:
  - id: cado-approve
    name: "CADO Framework Approval"
    description: "Final approval before shipping to production"
    evidence_required:
      - tests
      - lint
      - build
      - security
    approvers_required: 1

hooks:
  auto_execute: true
  before_intake: true
  after_intake: true
  before_plan: true
  after_plan: true
  before_gate: true
  after_gate: true
  before_build: false
  after_build: true
  before_prove: false
  after_prove: true
  before_ship: true
  after_ship: true

paths:
  templates: ".cado/templates"
  workflows: ".cado/workflows"
  commands: ".cado/commands"
  signals: ".cado/signals"
  agents: ".github/agents"
  prompts: ".github/prompts"
  cado: ".cado"


