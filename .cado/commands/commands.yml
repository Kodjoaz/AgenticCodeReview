schema_version: "1.0"
framework: cado
version: "0.1.0"
description: "CADO Framework multi-agent delivery framework command registry"

commands:
  - id: cado.intake
    name: "Intake"
    stage: intake
    description: "Capture and structure an incoming request into a change record"
    prompt_file: ".github/prompts/cado.intake.prompt.md"
    required: true

  - id: cado.route
    name: "Route"
    stage: intake
    description: "Evaluate the intake record and route to the correct specialist lane"
    prompt_file: ".github/prompts/cado.route.prompt.md"
    required: true

  - id: cado.plan
    name: "Plan"
    stage: plan
    description: "Decompose the intake record into a delivery plan with specialist assignments"
    prompt_file: ".github/prompts/cado.plan.prompt.md"
    required: true

  - id: cado.gate
    name: "Gate"
    stage: gate
    description: "Verify intake is complete and plan is feasible before proceeding"
    prompt_file: ".github/prompts/cado.gate.prompt.md"
    required: true

  - id: cado.build
    name: "Build"
    stage: build
    description: "Execute the delivery plan with specialist implementations"
    prompt_file: ".github/prompts/cado.build.prompt.md"
    required: true

  - id: cado.prove
    name: "Prove"
    stage: prove
    description: "Run validation, tests, and evidence collection"
    prompt_file: ".github/prompts/cado.prove.prompt.md"
    required: true

  - id: cado.evidence
    name: "Evidence"
    stage: prove
    description: "Collect and validate evidence artifacts from build/prove stages"
    prompt_file: ".github/prompts/cado.evidence.prompt.md"
    required: true

  - id: cado.ship
    name: "Ship"
    stage: ship
    description: "Finalize changes, document, and merge to production"
    prompt_file: ".github/prompts/cado.ship.prompt.md"
    required: true

  - id: cado.git.commit
    name: "Git Commit"
    stage: infrastructure
    description: "Commit outstanding working tree changes with message template"
    prompt_file: ".github/prompts/cado.git.commit.prompt.md"
    required: false
    extension: git

  - id: cado.git.feature
    name: "Git Feature Branch"
    stage: infrastructure
    description: "Create a feature branch with naming convention validation"
    prompt_file: ".github/prompts/cado.git.feature.prompt.md"
    required: false
    extension: git

  - id: cado.git.initialize
    name: "Git Initialize"
    stage: infrastructure
    description: "Initialize git hooks and branch conventions in repo"
    prompt_file: ".github/prompts/cado.git.initialize.prompt.md"
    required: false
    extension: git

stages:
  - name: intake
    description: "Capture and understand the request"
    position: 1

  - name: plan
    description: "Decompose into deliverables and specialist work"
    position: 2

  - name: gate
    description: "Verify readiness before execution"
    position: 3

  - name: build
    description: "Execute implementation work"
    position: 4

  - name: prove
    description: "Validate, test, and collect evidence"
    position: 5

  - name: ship
    description: "Finalize and merge to production"
    position: 6

