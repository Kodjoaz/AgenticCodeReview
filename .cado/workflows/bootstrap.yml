name: CADO Framework Bootstrap
description: Initialize CADO Framework in the target repository after installation
version: "1.0"
triggers:
  - event: installation
    condition: "after_install"

steps:
  - id: verify_installation
    name: Verify Installation
    description: Run post-install verification to ensure all files are in place
    run: |
      if [[ "$OSTYPE" == "msys" || "$OSTYPE" == "win32" ]]; then
        PowerShell -ExecutionPolicy Bypass -File .cado/scripts/powershell/verify-install.ps1 -TargetRepo .
      else
        bash .cado/scripts/bash/verify-install.sh --target .
      fi
    on_error: fail
    required: true

  - id: init_signals
    name: Initialize Signal Directory
    description: Create .cado/signals directory for inter-process communication
    run: |
      if [[ ! -d ".cado/signals" ]]; then
        mkdir -p .cado/signals
        touch .cado/signals/.gitkeep
      fi
    on_error: continue

  - id: init_git_hooks
    name: Initialize Git Hooks
    description: Set up git hooks if not already present
    run: |
      if [[ -d ".git" && ! -d ".git/hooks" ]]; then
        mkdir -p .git/hooks
        chmod +x .git/hooks
      fi
    on_error: continue

  - id: welcome_message
    name: Display Welcome Message
    description: Print quickstart instructions
    run: |
      cat << 'EOF'

      ╔════════════════════════════════════════════════════════════════════════╗
      ║                    ✓ CADO Framework Installed Successfully!                ║
      ╚════════════════════════════════════════════════════════════════════════╝

      Welcome to CADO Framework — A stage-based multi-agent delivery framework.

      QUICKSTART:
      -----------
      1. Review the framework constitution:
         → .cado/templates/constitution-template.md

      2. Start your first delivery:
         → Use the 'cado.intake' command in your AI tool
         → Describe your change or feature request
         → Follow the interactive workflow

      3. Explore the stages:
         intake → plan → gate → build → prove → ship

      DOCUMENTATION:
      ---------------
      • Framework Guide: .cado/README.md
      • Configuration: .cado/config.yml
      • Commands: .cado/commands/commands.yml
      • Prompts: .github/prompts/cado.*.prompt.md

      RESOURCES:
      ----------
      • Homepage: https://github.com/Keayoub/cado
      • Issues & Feedback: https://github.com/Keayoub/cado/issues
      • Discussions: https://github.com/Keayoub/cado/discussions

      Ready? Let's go! Run your first intake now →

      EOF
    on_error: continue

  - id: demo_intake
    name: Offer Demo Intake (Optional)
    description: Optionally run first intake as a demo
    run: |
      # This step is optional and would be invoked by the installer
      # if the user opts in during setup
      echo "Demo intake would run here. Call: cado.intake"
    on_error: continue
    optional: true

outputs:
  installation_successful: true
  timestamp: "{{NOW_UTC}}"
  target_repo: "{{TARGET_REPO}}"
  signals_initialized: true
  hooks_initialized: true

exit_code: 0


