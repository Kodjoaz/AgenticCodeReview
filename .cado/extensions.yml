settings:
  auto_execute_hooks: true

hooks:
  before_intake:
    - extension: git
      command: cado.git.commit
      enabled: true
      optional: true
      prompt: "Commit outstanding changes before intake?"
      description: "Auto-commit working tree before the intake stage begins"

  after_intake:
    - extension: cado
      command: cado.route
      enabled: true
      optional: false
      prompt: null
      description: "Evaluate the intake record and route to the correct specialist lane"

  before_plan:
    - extension: cado
      command: cado.gate
      enabled: true
      optional: false
      prompt: null
      description: "Verify intake is complete before planning starts"

  after_plan:
    - extension: cado
      command: cado.evidence
      enabled: true
      optional: false
      prompt: null
      description: "Record plan summary as an evidence artifact"

  before_gate:
    - extension: cado
      command: cado.evidence
      enabled: true
      optional: false
      prompt: null
      description: "Collect and validate evidence prior to gate review"

  after_gate:
    - extension: git
      command: cado.git.feature
      enabled: true
      optional: true
      prompt: "Create feature branch before build starts?"
      description: "Auto-create a feature branch after gate approval"

  before_build:
    - extension: cado
      command: cado.gate
      enabled: true
      optional: false
      prompt: null
      description: "Confirm gate approval is on record before build begins"

  after_build:
    - extension: cado
      command: cado.evidence
      enabled: true
      optional: false
      prompt: null
      description: "Record build outputs and changed files as evidence"

  before_prove:
    - extension: cado
      command: cado.evidence
      enabled: true
      optional: false
      prompt: null
      description: "Ensure build evidence exists before proof run"

  after_prove:
    - extension: cado
      command: cado.evidence
      enabled: true
      optional: false
      prompt: null
      description: "Record test results and coverage as evidence"

  before_ship:
    - extension: cado
      command: cado.gate
      enabled: true
      optional: false
      prompt: null
      description: "Final gate check: all prior evidence must be present"

  after_ship:
    - extension: git
      command: cado.git.commit
      enabled: true
      optional: false
      prompt: "Commit framework artifacts after ship?"
      description: "Auto-commit run record and evidence after ship completes"

